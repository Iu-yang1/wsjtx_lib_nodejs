name: Q65 Official Sample Decode

on:
  workflow_dispatch:
  push:
    branches: [feature/q65-chain]
    paths:
      - 'scripts/decode-official-q65-samples.mjs'
      - '.github/workflows/q65-official-samples.yml'
      - 'src/**'
      - 'native/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'package*.json'
      - 'tsconfig.json'

env:
  NODE_VERSION: '20'

jobs:
  decode-official-q65-samples:
    name: Decode official WSJT-X Q65 WAV samples
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential gfortran libfftw3-dev libboost-all-dev \
            pkg-config python3 ca-certificates

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Build native addon and TypeScript
        run: npm run build

      - name: Decode official WSJT-X Q65 samples
        run: node scripts/decode-official-q65-samples.mjs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: official-q65-samples-cache
          path: .cache/wsjtx-official-q65-samples/
          retention-days: 7
          if-no-files-found: ignore
